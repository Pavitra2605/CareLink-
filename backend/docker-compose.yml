version: '3.8'

services:
  carelink-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carelink-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      DB_PATH: /app/data/carelink.db
      LOG_LEVEL: info
    volumes:
      - carelink-data:/app/data
      - carelink-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  carelink-data:
    driver: local
  carelink-logs:
    driver: local

networks:
  default:
    name: carelink-network
